# Lint configuration for MEMS mask files.
# Tuned for typical laser mask writer (minimum feature ~1 µm, 0.1 µm grid).

min_angle_deg: 20.0
grid_um: 0.1

min_feature_size_um:
  1: 2.0    # diaphragm layer
  2: 1.0    # piezoresistor
  3: 3.0    # metal
  4: 2.0    # passivation
  5: 50.0   # backside DRIE — needs wide openings

min_spacing_um:
  3: 3.0    # metal-metal
